services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tmanagement
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tmanagement"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/tmanagement
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: