<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #2c3e50; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
        ul { list-style-type: none; padding: 0; margin-top: 20px; }
        li { background: #ecf0f1; margin-bottom: 10px; padding: 12px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #e74c3c; padding: 6px 10px; font-size: 12px; width: auto; color: white; border: none; border-radius: 3px; cursor: pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Minhas Tarefas</h1>
        <input type="text" id="titulo" placeholder="Título da tarefa">
        <input type="text" id="descricao" placeholder="Descrição da tarefa">
        <button onclick="criarTarefa()">Adicionar Tarefa</button>
        <ul id="lista-tarefas"></ul>
    </div>

    <script>
        async function carregarTarefas() {
            const resposta = await fetch('/tarefas');
            const tarefas = await resposta.json();
            const lista = document.getElementById('lista-tarefas');
            lista.innerHTML = '';
            tarefas.forEach(t => {
                lista.innerHTML += `<li>${t.titulo} <button class="delete-btn" onclick="deletarTarefa(${t.id})">Excluir</button></li>`;
            });
        }

        async function criarTarefa() {
            const titulo = document.getElementById('titulo').value;
            const descricao = document.getElementById('descricao').value;
            
            if(!titulo) return;

            // Enviando como FormData para ser compatível com Form(...) no FastAPI
            const formData = new FormData();
            formData.append('titulo', titulo);
            formData.append('descricao', descricao);

            await fetch('/tarefas', {
                method: 'POST',
                body: formData
            });

            document.getElementById('titulo').value = '';
            document.getElementById('descricao').value = '';
            carregarTarefas();
        }

        // Função para deletar (você precisará adicionar a rota @router.delete("/tarefas/{id}") no seu rotas.py)
        async function deletarTarefa(id) {
            await fetch(`/tarefas/${id}`, { method: 'DELETE' });
            carregarTarefas();
        }

        carregarTarefas();
    </script>
</body>
</html>
