<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login / Cadastro</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; width: 100%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="titulo">Entrar</h2>
        <form id="authForm">
            <input type="text" id="username" placeholder="Usuário" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit" id="btnAcao">Entrar</button>
        </form>
        <p id="toggleText" style="cursor:pointer; color:blue; text-align:center;" onclick="alternarModo()">Não tem conta? Cadastre-se</p>
    </div>

    <script>
        let modoLogin = true;

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById('titulo').innerText = modoLogin ? "Entrar" : "Cadastrar";
            document.getElementById('btnAcao').innerText = modoLogin ? "Entrar" : "Cadastrar";
            document.getElementById('toggleText').innerText = modoLogin ? "Não tem conta? Cadastre-se" : "Já tem conta? Entrar";
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (modoLogin) {
                const formData = new FormData();
                formData.append('username', user);
                formData.append('password', pass);
                const res = await fetch('/token', { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/';
                } else { alert("Erro no login!"); }
            } else {
                const res = await fetch('/registro', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass }) 
                });
                if (res.ok) { alert("Cadastro realizado!"); alternarModo(); }
                else { alert("Erro no cadastro!"); }
            }
        };
    </script>
</body>
</html>
